<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% block title %}<title>renderApp</title>{% endblock %}
    <!-- Bootstrap 5.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    {% load static %}
    <!-- Пользовательские стили приложения renderApp -->
    <link href="{% static 'renderApp/css/mycss.css' %}" rel="stylesheet" />
  </head>

  <body>
    <div class="container">

      <!-- Шапка сайта -->
      <header class="card mb-2">
        <div class="card-body bg-color">
          <h5 class="card-title">renderApp — демонстрация шаблонов Django</h5>
          <img
            src="{% static 'renderApp/images/settings_django.png' %}"
            width="100px"
            alt="Django settings"
          />
        </div>
      </header>

      <!-- Основной блок: навигация + контент -->
      <div class="card mb-2">
        <!-- Навигационная панель (подключается из отдельного файла) -->
        <nav class="card-header">
          {% include 'navigation.html' %}
        </nav>

        <!-- Основное содержимое страницы (переопределяется в дочерних шаблонах) -->
        <main class="card-body">
          {% block main %}{% endblock %}
        </main>
      </div>

      <!-- Подвал сайта -->
      <footer class="card">
        <div class="card-body">
          <p class="card-text">Контакты и др.</p>
        </div>
      </footer>

    </div>

    <!-- Bootstrap 5.3 JS Bundle (включает Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmfP7EKPss+Z7OuGBiHLHWBe9c9j"
      crossorigin="anonymous"
    ></script>
  </body>
</html>

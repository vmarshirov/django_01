<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% block title %}<title>websiteApp</title>{% endblock %}
    <!-- Bootstrap 5.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    {% load static %}
    <!-- Пользовательские стили приложения websiteApp -->
    <link href="{% static 'websiteApp/css/mycss.css' %}" rel="stylesheet" />
  </head>

  <body>
    <div class="container">

      <!-- Шапка сайта -->
      <div class="card mb-2">
        <div class="card-body bg-color">
          <h5 class="card-title">websiteApp — демонстрация форм Django</h5>
          <img
            src="{% static 'websiteApp/images/settings_django.png' %}"
            width="100px"
            alt="Django settings"
          />
        </div>
      </div>

      <!-- Основной блок: навигация + контент -->
      <div class="card mb-2">
        <div class="card-header">
          {# Навигационная панель с подсветкой активного пункта #}
          {% include 'navi.html' %}
        </div>
        <div class="card-body">
          {# Основное содержимое — переопределяется в дочерних шаблонах #}
          {% block main %}{% endblock %}
        </div>
      </div>

      <!-- Подвал сайта -->
      <div class="card">
        <div class="card-body">
          <p class="card-text">Контакты и др.</p>
        </div>
      </div>

    </div>

    <!-- Скрипт навигации для подсветки активного пункта меню -->
    <script src="{% static 'websiteApp/js/navigation.js' %}"></script>
    <!-- Bootstrap 5.3 JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmfP7EKPss+Z7OuGBiHLHWBe9c9j"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
